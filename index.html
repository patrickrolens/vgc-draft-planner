<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGC Draft Planner</title>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:#2e3248;
  --text:#e8eaf6;--text2:#9095b8;--text3:#5a5f80;
  --accent:#7c6ff7;--red:#e05555;--green:#4caf7d;--cb-green:#60a5fa;--yellow:#f0c060;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.t-Normal{background:#9199a1;color:#fff}.t-Fire{background:#e6724a;color:#fff}.t-Water{background:#539ddf;color:#fff}
.t-Grass{background:#5bbd58;color:#fff}.t-Electric{background:#f3d23b;color:#333}.t-Ice{background:#74cfc0;color:#fff}
.t-Fighting{background:#ce4069;color:#fff}.t-Poison{background:#ab6ac8;color:#fff}.t-Ground{background:#d97845;color:#fff}
.t-Flying{background:#89aae3;color:#fff}.t-Psychic{background:#f97176;color:#fff}.t-Bug{background:#90c12c;color:#fff}
.t-Rock{background:#c7b78b;color:#fff}.t-Ghost{background:#5269ac;color:#fff}.t-Dragon{background:#0b6dc3;color:#fff}
.t-Dark{background:#5a5366;color:#fff}.t-Steel{background:#5a8ea1;color:#fff}.t-Fairy{background:#ec8fe6;color:#fff}

nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:15px;font-weight:700;color:var(--accent);padding:14px 16px 14px 0;margin-right:8px;border-right:1px solid var(--border);white-space:nowrap;}
.nav-tab{padding:14px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all 0.15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.view{display:none;padding:1.5rem;max-width:1400px;margin:0 auto;}
.view.active{display:block;}

.draft-layout{display:grid;grid-template-columns:1fr 360px;gap:1.5rem;align-items:start;}
@media(max-width:960px){.draft-layout{grid-template-columns:1fr;}}
.draft-team{display:flex;flex-direction:column;gap:8px;}
.draft-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.toolbar-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:12px;padding:5px 12px;}
.toolbar-btn:hover{color:var(--text);border-color:var(--accent);}
.toolbar-btn.toolbar-btn-accent{border-color:rgba(124,111,247,0.4);color:var(--accent);}
.toolbar-btn.toolbar-btn-accent:hover{background:rgba(124,111,247,0.12);}
.toolbar-spacer{flex:1;}
/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;}
.modal-title{font-size:15px;font-weight:700;color:var(--text);}
.modal-input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px;width:100%;outline:none;}
.modal-input:focus{border-color:var(--accent);}
.modal-btn-row{display:flex;gap:8px;justify-content:flex-end;}
.modal-btn{padding:6px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);}
.modal-btn:hover{color:var(--text);border-color:var(--accent);}
.modal-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.modal-btn.primary:hover{opacity:0.85;}
.modal-btn.danger{border-color:rgba(224,85,85,0.5);color:var(--red);}
.modal-btn.danger:hover{background:rgba(224,85,85,0.1);}
/* Team list in load modal */
.team-list{display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto;margin-top:4px;}
.team-list-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;}
.team-list-item.active-team{border-color:rgba(124,111,247,0.6);background:rgba(124,111,247,0.08);}
.team-list-name{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team-list-date{font-size:11px;color:var(--text3);white-space:nowrap;}
.team-list-empty{color:var(--text3);font-size:13px;text-align:center;padding:20px 0;}
/* Paste modal */
.paste-textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:10px 12px;font-size:12px;font-family:monospace;width:100%;min-height:320px;resize:vertical;outline:none;line-height:1.6;}
.paste-textarea:focus{border-color:var(--accent);}

/* SLOT */
.draft-slot{background:var(--bg2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:flex-start;gap:12px;padding:10px 14px;transition:border-color 0.15s,opacity 0.15s;}
.draft-slot.drag-over{border-color:var(--accent);background:rgba(124,111,247,0.08);}
.draft-slot.dragging{opacity:0.4;}
.slot-sprite-empty{width:72px;height:72px;border:1px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:22px;cursor:pointer;transition:border-color 0.15s,color 0.15s;}
.slot-sprite-empty:hover{border-color:var(--accent);color:var(--accent);}
/* Slot popover */
.slot-popover{position:absolute;z-index:300;background:var(--bg2);border:1px solid var(--accent);border-radius:10px;padding:8px;width:280px;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.slot-popover input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px 8px 32px;color:var(--text);font-size:13px;outline:none;}
.slot-popover input:focus{border-color:var(--accent);}
.slot-popover input::placeholder{color:var(--text3);}
.slot-popover-icon{position:absolute;left:20px;top:22px;color:var(--text3);font-size:13px;pointer-events:none;}
.slot-popover-results{max-height:220px;overflow-y:auto;margin-top:6px;}
.slot-pop-item{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;border-radius:6px;transition:background 0.1s;}
.slot-pop-item:hover,.slot-pop-item.highlighted{background:var(--bg3);}
.slot-pop-item.already-in{opacity:0.4;pointer-events:none;}
.slot-pop-item.illegal-r .slot-pop-sprite{opacity:0.35;filter:grayscale(80%);}
.slot-pop-sprite{width:32px;height:32px;image-rendering:auto;flex-shrink:0;}
.slot-pop-name{font-size:12px;font-weight:600;}
.slot-pop-sub{font-size:10px;color:var(--text2);margin-top:1px;display:flex;gap:4px;align-items:center;}
.slot-pop-pts{font-size:11px;font-weight:700;margin-left:auto;flex-shrink:0;}
.drag-handle{cursor:grab;color:var(--text3);font-size:14px;padding:0 2px;flex-shrink:0;padding-top:22px;touch-action:none;user-select:none;}
.drag-handle:active{cursor:grabbing;}
.draft-slot.illegal-slot{border-color:#3d2525;}
.draft-slot:hover{border-color:#3e4460;}
.slot-num{font-size:11px;color:var(--text3);font-weight:600;width:16px;text-align:center;flex-shrink:0;padding-top:4px;}

/* sprite + points column */
.slot-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:2px;width:72px;}
.slot-sprite{width:72px;height:72px;image-rendering:auto;display:block;}
.slot-sprite.illegal-img{opacity:0.3;filter:grayscale(90%);}
.slot-pts-display{font-size:20px;font-weight:700;color:#fff;line-height:1;}
.slot-pts-display.illegal-pts{color:var(--red);font-size:13px;}
.slot-alt-form-btn{display:block;width:100%;padding:2px 4px;font-size:9px;font-weight:700;background:rgba(124,111,247,0.15);border:1px solid rgba(124,111,247,0.35);color:var(--accent);border-radius:3px;cursor:pointer;text-align:center;white-space:nowrap;transition:background 0.15s;}
.slot-alt-form-btn:hover{background:rgba(124,111,247,0.28);}
.slot-alt-form-btn.active{background:rgba(124,111,247,0.3);border-color:rgba(124,111,247,0.65);}
.slot-alt-form-placeholder{height:21px;}


/* slot body */
.slot-body{flex:1;min-width:0;}
/* each info row is flex: left content + right-aligned matchup badges */
.slot-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-top:4px;}
.slot-row:first-child{margin-top:0;}
.slot-row-left{display:flex;flex-wrap:wrap;gap:4px;flex:1;min-width:0;}
.slot-row-right{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;flex-shrink:0;max-width:45%;}
.slot-name{font-size:14px;font-weight:700;}
.slot-name.illegal-name{color:var(--text3);}
.ability-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;background:rgba(124,111,247,0.15);color:#a89df9;border:1px solid rgba(124,111,247,0.3);}
.slot-bst{font-size:11px;color:var(--text3);}

/* compact stat numbers */
.slot-stats-compact{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.stat-num{font-size:10px;color:var(--text2);}
.stat-num span{color:var(--text);font-weight:600;}

/* matchup badges — compact right-aligned */
.tm-weak-sm{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(224,85,85,0.2);color:var(--red);border:1px solid rgba(224,85,85,0.3);white-space:nowrap;}
.tm-weak-sm.tm-4x{background:rgba(224,85,85,0.38);border-color:rgba(224,85,85,0.65);color:#ff8080;}
.tm-resist-sm{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(76,175,125,0.12);color:var(--green);border:1px solid rgba(76,175,125,0.25);white-space:nowrap;}
.tm-resist-sm.tm-quarter{background:rgba(76,175,125,0.25);border-color:rgba(76,175,125,0.5);color:#7fffbb;}
/* ── COLORBLIND MODE (body.cb swaps green → blue everywhere) ── */
body.cb{--green:var(--cb-green);}
body.cb .tm-resist-sm{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.25);}
body.cb .tm-resist-sm.tm-quarter{background:rgba(96,165,250,0.25);border-color:rgba(96,165,250,0.5);color:#93c5fd;}
body.cb .draft-slot[style*="rgba(76,175,125"]{background-color:rgba(96,165,250,0.08)!important;}
.cb-toggle{margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 14px;border-left:1px solid var(--border);cursor:pointer;user-select:none;font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;}
.cb-toggle:hover{color:var(--text2);}
.cb-toggle input{accent-color:var(--cb-green);cursor:pointer;}
.cb-toggle.cb-on{color:var(--cb-green);}
.tm-immune-sm{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(90,83,102,0.25);color:#888;border:1px solid rgba(90,83,102,0.35);white-space:nowrap;}

.slot-moves{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.move-tag{font-size:10px;background:var(--bg3);border:1px solid var(--border);padding:1px 6px;border-radius:3px;color:var(--text2);}

/* right controls */
.slot-right{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}
.slot-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;line-height:1;padding:3px 5px;border-radius:4px;}
.slot-remove:hover{color:var(--red);background:rgba(224,85,85,0.1);}
.slot-undo{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;padding:2px 6px;white-space:nowrap;transition:color 0.15s,border-color 0.15s;}
.slot-undo:hover{color:var(--accent);border-color:var(--accent);}
.slot-expand{background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:11px;padding:3px 7px;border-radius:4px;white-space:nowrap;}
.slot-expand:hover{color:var(--text);border-color:var(--accent);}

/* EXPANDED PANEL */
.slot-expanded-panel{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.slot-expanded-panel.open{display:flex;flex-direction:column;gap:12px;}
.expanded-top{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;}
.radar-large-wrap{flex-shrink:0;}
.stat-bars-large{flex:1;min-width:160px;display:flex;flex-direction:column;gap:5px;background:var(--bg3);border-radius:8px;padding:10px;}
.stat-bar-row{display:flex;align-items:center;gap:6px;}
.stat-bar-label{font-size:10px;font-weight:600;width:28px;text-align:right;flex-shrink:0;}
.stat-bar-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;}
.stat-bar-val{font-size:10px;color:var(--text2);width:28px;text-align:right;flex-shrink:0;}

/* SEARCH */
.search-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.search-box{position:relative;flex:1;}
.search-box input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 44px 10px 36px;color:var(--text);font-size:14px;outline:none;}
.search-box input:focus{border-color:var(--accent);}
.search-box input::placeholder{color:var(--text3);}
.search-legal-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;white-space:nowrap;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.random-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:2px;line-height:1;transition:color 0.15s;}
.random-btn:hover{color:var(--accent);}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-height:320px;overflow-y:auto;display:none;}
.search-results.open{display:block;}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid var(--border);}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover,.sr-item.highlighted{background:var(--bg3);}
.sr-item.already-in{opacity:0.4;pointer-events:none;}
.sr-item.illegal-r .sr-sprite{opacity:0.35;filter:grayscale(80%);}
.sr-sprite{width:36px;height:36px;image-rendering:auto;flex-shrink:0;}
.sr-name{font-size:13px;font-weight:600;}
.sr-sub{font-size:11px;color:var(--text2);margin-top:2px;display:flex;gap:5px;align-items:center;}
.sr-pts{font-size:11px;font-weight:700;margin-left:auto;flex-shrink:0;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:12px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px;}
.points-display{text-align:center;margin-bottom:10px;}
.pts-num{font-size:36px;font-weight:700;color:var(--accent);line-height:1;}
.pts-lbl{font-size:12px;color:var(--text2);margin-top:2px;}
.pts-bar-bg{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin-top:10px;}
.pts-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width 0.3s,background 0.3s;}
.pts-bar-fill.warn{background:var(--yellow);}
.pts-bar-fill.over{background:var(--red);}
.pts-limit-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.pts-limit-lbl{font-size:11px;color:var(--text3);}
.pts-limit-inp{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;font-weight:600;width:70px;text-align:center;padding:3px 6px;outline:none;}
.pts-limit-inp:focus{border-color:var(--accent);}
.tm-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;}
.tm-cell{text-align:center;padding:4px 2px;border-radius:4px;transition:filter 0.1s;cursor:pointer;}
.tm-cell:hover{filter:brightness(1.15);}
.tm-cell.tm-pinned{filter:brightness(1.25);outline:2px solid #fff;outline-offset:-2px;}
.tmt{font-size:11px;line-height:1;font-weight:700;}
.tmv{font-size:10px;font-weight:600;line-height:1.5;color:var(--text2);}

/* Expanded TM view */
.tm-exp-row{display:flex;align-items:center;gap:6px;padding:3px 0;}
.tm-exp-badge{display:flex;align-items:center;justify-content:space-between;border-radius:5px;padding:4px 8px;flex:1;cursor:pointer;transition:filter 0.1s;}
.tm-exp-badge:hover{filter:brightness(1.15);}
.tm-exp-badge.tm-pinned{outline:2px solid #fff;outline-offset:-2px;filter:brightness(1.25);}
.tm-exp-name{font-size:11px;font-weight:700;}
.tm-exp-ratio{font-size:11px;font-weight:700;}
.tm-section-divider{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:6px 0 2px;border-top:1px solid var(--border);margin-top:2px;}
.tm-section-divider:first-child{border-top:none;padding-top:0;}
.speed-tiers{display:flex;flex-direction:column;gap:3px;}
.speed-row{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;}
.speed-lbl{width:55px;font-size:10px;font-weight:600;text-align:right;flex-shrink:0;}
.speed-icons{display:flex;flex-wrap:wrap;gap:2px;flex:1;}
.util-section{margin-bottom:0;padding:8px 0;border-top:1px solid rgba(255,255,255,0.08);}
.util-section:first-child{border-top:none;padding-top:0;}
.util-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:5px;}
.util-row{display:flex;align-items:center;margin-bottom:1px;border-radius:3px;}
.util-row:nth-child(even){background:rgba(255,255,255,0.03);}
.util-mn{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;padding:2px 4px;}
.util-mn-none{color:var(--text3);}
.util-icons{display:flex;flex-wrap:wrap;gap:2px;padding:2px 0;}

/* INDEX */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center;position:sticky;top:50px;z-index:50;background:var(--bg);padding:8px 0;}
.fi{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:13px;outline:none;}
.fi-multi-wrap{position:relative;}
.fi-multi-display{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:13px;cursor:pointer;white-space:nowrap;user-select:none;min-width:110px;}
.fi-multi-display:hover{border-color:var(--accent);}
.fi-multi-display.active{border-color:var(--accent);color:var(--accent);}
.fi-arrow{font-size:10px;margin-left:4px;}
.fi-multi-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px;min-width:160px;max-height:260px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.fi-multi-dropdown.open{display:block;}
.fi-multi-opt{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text2);}
.fi-multi-opt:hover{background:var(--bg3);}
.fi-multi-opt input{accent-color:var(--accent);flex-shrink:0;}
.fi-multi-opt.checked{color:var(--text);}
.fi-multi-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);padding:6px 8px 2px;margin-top:4px;border-top:1px solid var(--border);}
.fi-multi-section:first-child{border-top:none;margin-top:0;}
.fi:focus{border-color:var(--accent);}
.fi::placeholder{color:var(--text3);}
select.fi option{background:var(--bg2);}
.res-count{font-size:12px;color:var(--text3);margin-left:auto;}
.idx-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.idx-tbl th{background:var(--bg2);padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;position:sticky;top:0;z-index:10;box-shadow:0 1px 0 var(--border);}
.idx-tbl th:hover{color:var(--text);}
.idx-tbl th.sa::after{content:" ▲";}
.idx-tbl th.sd::after{content:" ▼";}

<script>
let POKEMON_DATA = [];
let UG = [];

// ── SPRITES ───────────────────────────────────────────────────────────────────
// Draft Builder: ./sprites/ (Home-style art) primary → ./icons/ fallback
// Index + Pool:  ./icons/ (PC icons) primary → ./sprites/ fallback

function localId(id) {
  const m = id.match(/^(\d+)(.*)$/);
  if (!m) return id;
  const num = parseInt(m[1]);
  const padded = num >= 1000 ? String(num) : String(num).padStart(3, '0');
  return padded + m[2];
}

function spriteUrl(mon) {
  if (!mon.id) return '';
  return './sprites/' + localId(mon.id) + '.png';
}

function iconUrl(mon) {
  if (!mon.id) return '';
  return './icons/' + localId(mon.id) + '.png';
}

// Pokéball data URI used as the final fallback when no sprite/icon is found
const POKEBALL_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%23e05555' stroke='%23333' stroke-width='1.5'/%3E%3Cpath d='M1.1 20 A19 19 0 0 0 38.9 20 Z' fill='%23fff'/%3E%3Crect x='1' y='18' width='38' height='4' fill='%23333'/%3E%3Ccircle cx='20' cy='20' r='7' fill='%23fff' stroke='%23333' stroke-width='1.5'/%3E%3Ccircle cx='20' cy='20' r='3.5' fill='%23e8eaf6' stroke='%23333' stroke-width='1'/%3E%3C/svg%3E";

// ── STORAGE KEYS ──────────────────────────────────────────────────────────────
const LS_TEAMS   = 'vgcdraft_teams';
const LS_SESSION = 'vgcdraft_session';
const LS_CB      = 'vgcdraft_cbmode';

function setCBMode(on, silent) {
  document.body.classList.toggle('cb', on);
  document.getElementById('cb-toggle').checked = on;
  document.getElementById('cb-toggle-label').classList.toggle('cb-on', on);
  localStorage.setItem(LS_CB, on ? '1' : '0');
  // Re-apply any active matchup highlight so inline styles update
  if (!silent && typeof pinnedType !== 'undefined' && pinnedType) applyMatchupHighlight(pinnedType);
}
// Restore preference on load
(function() {
  if (localStorage.getItem(LS_CB) === '1') setCBMode(true, true);
})();

// ── SESSION PERSISTENCE ────────────────────────────────────────────────────────
function saveSession(){
  try {
    const state = {
      team: team.map(m => m ? {id: m.id, pasteData: m.pasteData||null} : null),
      altFormActive: [...altFormActive],
      megaBaseActive: [...megaBaseActive],
      expanded: [...expanded],
    };
    localStorage.setItem(LS_SESSION, JSON.stringify(state));
  } catch(e){}
}

function restoreSession(){
  try {
    const raw = localStorage.getItem(LS_SESSION);
    if(!raw) return;
    const state = JSON.parse(raw);
    if(state.altFormActive) state.altFormActive.forEach(id => altFormActive.add(id));
    if(state.megaBaseActive) state.megaBaseActive.forEach(id => megaBaseActive.add(id));
    if(state.expanded) state.expanded.forEach(i => expanded.add(i));
    if(state.team){
      state.team.forEach(function(entry, i){
        if(!entry) return;
        const mon = POKEMON_DATA.find(p => p.id === entry.id);
        if(mon){
          team[i] = mon;
          if(entry.pasteData) team[i] = Object.assign({}, mon, {pasteData: entry.pasteData});
        }
      });
    }
  } catch(e){}
}

// ── SAVE / LOAD ────────────────────────────────────────────────────────────────
function getSavedTeams(){
  try { return JSON.parse(localStorage.getItem(LS_TEAMS)||'[]'); } catch(e){ return []; }
}
function putSavedTeams(teams){
  localStorage.setItem(LS_TEAMS, JSON.stringify(teams));
}

function nextDefaultName(teams){
  let n = 1;
  const names = new Set(teams.map(t => t.name));
  while(names.has('Team ' + n)) n++;
  return 'Team ' + n;
}

let _pendingOverwriteName = null;
let _lastUsedTeamName = null;  // tracks most recently saved/loaded team name

function openSaveLoadModal(){
  const teams = getSavedTeams();
  const input = document.getElementById('save-name-input');
  // Default to last used name, or next available default
  input.value = _lastUsedTeamName || nextDefaultName(teams);
  refreshTeamList();
  document.getElementById('saveload-modal').classList.remove('hidden');
  setTimeout(()=>{ input.select(); input.focus(); }, 50);
}

function refreshTeamList(){
  const teams = getSavedTeams();
  const list = document.getElementById('team-list');
  if(!teams.length){
    list.innerHTML = '<div class="team-list-empty">No saved teams yet.</div>';
    return;
  }
  // Display newest-first (reverse order), but pass real index for operations
  list.innerHTML = teams.map(function(t, i){ return {t, i}; })
    .reverse()
    .map(function(obj){
      const {t, i} = obj;
      const isActive = _lastUsedTeamName && t.name === _lastUsedTeamName;
      return '<div class="team-list-item' + (isActive ? ' active-team' : '') + '">'
        + '<div class="team-list-name" title="' + t.name + '">' + t.name + '</div>'
        + '<div class="team-list-date">' + t.savedAt + '</div>'
        + '<button class="modal-btn" style="padding:3px 10px;font-size:11px;white-space:nowrap" onclick="saveIntoSlot(' + i + ')">Save</button>'
        + '<button class="modal-btn primary" style="padding:3px 10px;font-size:11px" onclick="loadTeam(' + i + ')">Load</button>'
        + '<button class="modal-btn danger" style="padding:3px 8px;font-size:11px" onclick="deleteTeam(' + i + ')">✕</button>'
        + '</div>';
    }).join('');
}

function confirmSave(){
  const name = document.getElementById('save-name-input').value.trim();
  if(!name) return;
  const teams = getSavedTeams();
  const existing = teams.find(t => t.name === name);
  if(existing){
    _pendingOverwriteName = name;
    document.getElementById('overwrite-msg').textContent =
      `A team named "${name}" already exists. Overwrite it?`;
    document.getElementById('overwrite-modal').classList.remove('hidden');
    return;
  }
  doSave(name);
}

// Save into an existing slot by index (the Save button on each row)
function saveIntoSlot(i){
  const teams = getSavedTeams();
  const t = teams[i];
  if(!t) return;
  _pendingOverwriteName = t.name;
  document.getElementById('overwrite-msg').textContent =
    `Overwrite "${t.name}" with the current team?`;
  document.getElementById('overwrite-modal').classList.remove('hidden');
}

function confirmOverwrite(){
  closeModal('overwrite-modal');
  if(_pendingOverwriteName) doSave(_pendingOverwriteName);
  _pendingOverwriteName = null;
}

function doSave(name){
  const teams = getSavedTeams();
  const idx = teams.findIndex(t => t.name === name);
  const entry = {
    name,
    savedAt: new Date().toLocaleDateString(),
    slots: team.map(m => m ? {id: m.id, pasteData: m.pasteData||null} : null),
    altFormActive: [...altFormActive],
    megaBaseActive: [...megaBaseActive],
  };
  if(idx >= 0) teams.splice(idx, 1);  // remove from current position
  teams.push(entry);                   // always add at end (= top of reversed display)
  putSavedTeams(teams);
  _lastUsedTeamName = name;
  // Update input to reflect the saved name and refresh list
  const input = document.getElementById('save-name-input');
  if(input) input.value = name;
  refreshTeamList();
  showToast('Team "' + name + '" saved.', 'ok');
}

function loadTeam(i){
  const teams = getSavedTeams();
  const entry = teams[i];
  if(!entry) return;
  team = new Array(TS).fill(null);
  slotHistory = new Array(TS).fill(null);
  expanded.clear();
  altFormActive.clear();
  megaBaseActive.clear();
  if(entry.altFormActive) entry.altFormActive.forEach(id => altFormActive.add(id));
  if(entry.megaBaseActive) entry.megaBaseActive.forEach(id => megaBaseActive.add(id));
  entry.slots.forEach(function(slot, idx){
    if(!slot) return;
    const mon = POKEMON_DATA.find(p => p.id === slot.id);
    if(mon) team[idx] = slot.pasteData ? Object.assign({}, mon, {pasteData: slot.pasteData}) : mon;
  });
  _lastUsedTeamName = entry.name;
  // Update input and refresh list to show active highlight
  const input = document.getElementById('save-name-input');
  if(input) input.value = entry.name;
  refreshTeamList();
  closeModal('saveload-modal');
  renderTeam(); renderSidebar(); saveSession();
  showToast('Team "' + entry.name + '" loaded.', 'ok');
}

function deleteTeam(i){
  const teams = getSavedTeams();
  const name = teams[i].name;
  teams.splice(i, 1);
  putSavedTeams(teams);
  if(_lastUsedTeamName === name) _lastUsedTeamName = null;
  const input = document.getElementById('save-name-input');
  if(input && input.value === name) input.value = nextDefaultName(getSavedTeams());
  refreshTeamList();
  showToast('"' + name + '" deleted.', 'warn');
}

// ── POKEPASTE IMPORT / EXPORT ──────────────────────────────────────────────────

// Build reverse lookup: showdown-normalised name -> pokemon entry
function buildNameLookup(){
  const map = {};
  POKEMON_DATA.forEach(function(p){
    // Primary name
    map[normalize(p.name)] = p;
    // Aliases (e.g. Maushold-Four -> Maushold)
    if(p.aliases){
      p.aliases.forEach(function(a){ map[normalize(a)] = p; });
    }
    // Alt form names -> base mon with isAlt flag
    if(p.altForm){
      map[normalize(p.altForm.name)] = {base: p, isAlt: true};
    }
  });
  // Also map altFormIds entries (entries in POKEMON_DATA that ARE alt forms)
  // to their base form so importing "Aegislash-Blade" finds Aegislash
  POKEMON_DATA.forEach(function(p){
    if(altFormIds.has(p.id)){
      // Find the base form (the one whose altForm.spriteId === p.id)
      const base = POKEMON_DATA.find(function(b){
        return b.altForm && b.altForm.spriteId === p.id;
      });
      if(base){
        map[normalize(p.name)] = {base: base, isAlt: true};
        if(p.aliases){
          p.aliases.forEach(function(a){ map[normalize(a)] = {base: base, isAlt: true}; });
        }
      }
    }
  });
  return map;
}
function normalize(s){ return s.toLowerCase().replace(/[^a-z0-9]/g,''); }
let _nameLookup = null;

function teamToPaste(){
  return team.map(function(mon){
    if(!mon) return null;
    const disp = getDisplayMon(mon);
    const pd = mon.pasteData || {};
    // Use preserved alias name if the mon was imported as something like "Sinistcha-Masterpiece"
    const speciesName = (pd.importedAs && _nameLookup && _nameLookup[normalize(pd.importedAs)])
    ? pd.importedAs : disp.name;
    const lines = [];
    // First line: Nickname (Species) (Gender) @ Item
    let firstLine = '';
    if(pd.nickname){
      firstLine = pd.nickname + ' (' + speciesName + ')';
    } else {
      firstLine = speciesName;
    }
    if(pd.gender) firstLine += ' (' + pd.gender + ')';
    if(pd.item)   firstLine += ' @ ' + pd.item;
    lines.push(firstLine);
    if(pd.ability) lines.push('Ability: ' + pd.ability);
    if(pd.level)   lines.push('Level: ' + pd.level);
    if(pd.tera)    lines.push('Tera Type: ' + pd.tera);
    if(pd.evs)     lines.push('EVs: ' + pd.evs);
    if(pd.ivs)     lines.push('IVs: ' + pd.ivs);
    if(pd.nature)  lines.push(pd.nature + ' Nature');
    if(pd.moves && pd.moves.length){
      pd.moves.forEach(function(m){ if(m) lines.push('- ' + m); });
    }
    return lines.join('\n');
  }).filter(Boolean).join('\n\n');
}

function parseFirstLine(firstLine){
  // Handles all these formats:
  //   Species @ Item
  //   Species
  //   Nickname (Species) @ Item
  //   Nickname (Species)
  //   Species (M) @ Item        <- gender, no nickname
  //   Species (F)               <- gender, no nickname
  //   Nickname (Species) (M) @ Item

  let remaining = firstLine;
  let item = null;
  let gender = null;
  let nickname = null;

  // Strip item
  const atIdx = remaining.indexOf(' @ ');
  if(atIdx >= 0){
    item = remaining.slice(atIdx + 3).trim();
    remaining = remaining.slice(0, atIdx).trim();
  }

  // Strip gender marker — (M) or (F) at the end
  const genderMatch = remaining.match(/^(.*)\s+\(([MF])\)\s*$/);
  if(genderMatch){
    remaining = genderMatch[1].trim();
    gender = genderMatch[2];
  }

  // Check for species in parentheses: Nickname (Species)
  const parenMatch = remaining.match(/^(.+)\(([^)]+)\)\s*$/);
  let species;
  if(parenMatch){
    nickname = parenMatch[1].trim() || null;
    species = parenMatch[2].trim();
  } else {
    species = remaining;
  }

  return {species, item, nickname, gender};
}

function parsePaste(text){
  const blocks = text.trim().split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
  return blocks.map(function(block){
    const lines = block.split('\n').map(l => l.trim());
    const result = {raw: block};
    const {species, item, nickname, gender} = parseFirstLine(lines[0] || '');
    result.name = species;
    if(item)     result.item     = item;
    if(nickname) result.nickname = nickname;
    if(gender)   result.gender   = gender;
    lines.slice(1).forEach(function(line){
      if(line.startsWith('Ability:'))   result.ability = line.slice(8).trim();
      if(line.startsWith('Tera Type:')) result.tera    = line.slice(10).trim();
      if(line.startsWith('EVs:'))       result.evs     = line.slice(4).trim();
      if(line.startsWith('IVs:'))       result.ivs     = line.slice(4).trim();
      if(line.startsWith('Level:'))     result.level   = line.slice(6).trim();
      if(line.match(/Nature$/))         result.nature  = line.replace(/\s*Nature$/,'').trim();
      if(line.startsWith('- '))         (result.moves = result.moves||[]).push(line.slice(2).trim());
    });
    return result;
  });
}

function openPasteModal(){
  document.getElementById('paste-textarea').value = teamToPaste();
  document.getElementById('paste-modal').classList.remove('hidden');

function applyPaste(){
  if(!_nameLookup) _nameLookup = buildNameLookup();
  const text = document.getElementById('paste-textarea').value;
  const blocks = parsePaste(text);

  let unrecognized = 0;
  const newTeam = new Array(TS).fill(null);
  const newAltActive = new Set();

  const toProcess = blocks.slice(0, 10);
  const excess = blocks.length > 10;

  toProcess.forEach(function(block, i){
    const key = normalize(block.name);
    const match = _nameLookup[key];
    if(!match){ unrecognized++; return; }

    let mon, slotIdx = i;
    if(match.isAlt){
      // Alt form — use base, activate toggle
      mon = match.base;
      newAltActive.add(mon.id);
    } else {
      mon = match;
    }

    // Find first empty slot at or after i
    while(slotIdx < TS && newTeam[slotIdx]) slotIdx++;
    if(slotIdx >= TS) return;

    const pasteData = {
      nickname: block.nickname || null,
      gender:   block.gender   || null,
      item:     block.item     || null,
      ability:  block.ability  || null,
      level:    block.level    || null,
      tera:     block.tera     || null,
      evs:      block.evs      || null,
      ivs:      block.ivs      || null,
      nature:   block.nature   || null,
      moves:    block.moves    || [],
      importedAs: (block.name !== mon.name) ? block.name : null,
    };
    newTeam[slotIdx] = Object.assign({}, mon, {pasteData});
  });

  team = newTeam;
  slotHistory = new Array(TS).fill(null);
  altFormActive.clear();
  newAltActive.forEach(id => altFormActive.add(id));
  expanded.clear();

  closeModal('paste-modal');
  renderTeam(); renderSidebar(); saveSession();

  if(excess) showToast('More than 10 entries detected. Excess entries discarded.', 'warn');
  if(unrecognized) showToast(unrecognized + ' unrecognized Pokémon failed to import.', 'warn');
  if(!excess && !unrecognized) showToast('Team imported successfully.', 'ok');
}

const TYPES=["Normal","Fire","Water","Grass","Electric","Ice","Fighting","Poison","Ground","Flying","Psychic","Bug","Rock","Ghost","Dragon","Dark","Steel","Fairy"];
const TC={
  Normal:{Ghost:0,Rock:0.5,Steel:0.5},
  Fire:{Fire:0.5,Water:0.5,Grass:2,Ice:2,Bug:2,Rock:0.5,Dragon:0.5,Steel:2},
  Water:{Fire:2,Water:0.5,Grass:0.5,Ground:2,Rock:2,Dragon:0.5},
  Grass:{Fire:0.5,Water:2,Grass:0.5,Poison:0.5,Ground:2,Flying:0.5,Bug:0.5,Rock:2,Dragon:0.5,Steel:0.5},
  Electric:{Water:2,Grass:0.5,Electric:0.5,Ground:0,Flying:2,Dragon:0.5},
  Ice:{Fire:0.5,Water:0.5,Grass:2,Ice:0.5,Ground:2,Flying:2,Dragon:2,Steel:0.5},
  Fighting:{Normal:2,Ice:2,Poison:0.5,Flying:0.5,Psychic:0.5,Bug:0.5,Rock:2,Ghost:0,Dark:2,Steel:2,Fairy:0.5},
  Poison:{Grass:2,Poison:0.5,Ground:0.5,Rock:0.5,Ghost:0.5,Steel:0,Fairy:2},
  Ground:{Fire:2,Electric:2,Grass:0.5,Poison:2,Flying:0,Bug:0.5,Rock:2,Steel:2},
  Flying:{Electric:0.5,Grass:2,Fighting:2,Bug:2,Rock:0.5,Steel:0.5},
  Psychic:{Fighting:2,Poison:2,Psychic:0.5,Dark:0,Steel:0.5},
  Bug:{Fire:0.5,Grass:2,Fighting:0.5,Poison:0.5,Flying:0.5,Psychic:2,Ghost:0.5,Dark:2,Steel:0.5,Fairy:0.5},
  Rock:{Fire:2,Ice:2,Fighting:0.5,Ground:0.5,Flying:2,Bug:2,Steel:0.5},
  Ghost:{Normal:0,Psychic:2,Ghost:2,Dark:0.5},
  Dragon:{Dragon:2,Steel:0.5,Fairy:0},
  Dark:{Fighting:0.5,Psychic:2,Ghost:2,Dark:0.5,Fairy:0.5},
  Steel:{Fire:0.5,Water:0.5,Electric:0.5,Ice:2,Rock:2,Steel:0.5,Fairy:2},
  Fairy:{Fire:0.5,Fighting:2,Poison:0.5,Dragon:2,Dark:2,Steel:0.5},
};

function abilityMods(ab){
  switch(ab){
    case"Levitate":return{Ground:0};case"Flash Fire":return{Fire:0};
    case"Water Absorb":case"Storm Drain":return{Water:0};
    case"Volt Absorb":case"Lightning Rod":case"Motor Drive":return{Electric:0};
    case"Sap Sipper":return{Grass:0};case"Earth Eater":return{Ground:0};
    case"Well-Baked Body":return{Fire:0};case"Dry Skin":return{Water:0,Fire:1.25};
    case"Heatproof":return{Fire:0.5};case"Thick Fat":return{Fire:0.5,Ice:0.5};
    case"Purifying Salt":return{Ghost:0.5};case"Wonder Guard":return"__wg__";
    default:return{};
  }
}

function calcMatchups(mon){
  let m={};
  TYPES.forEach(atk=>{
    let v=1,c=TC[atk]||{};
    if(mon.type1&&c[mon.type1]!==undefined)v*=c[mon.type1];
    if(mon.type2&&c[mon.type2]!==undefined)v*=c[mon.type2];
    m[atk]=v;
  });
  let best={},wg=false;
  (mon.abilities||[]).forEach(ab=>{
    const mod=abilityMods(ab);
    if(mod==="__wg__"){wg=true;return;}
    Object.entries(mod).forEach(([t,v])=>{if(best[t]===undefined||v<best[t])best[t]=v;});
  });
  if(wg)TYPES.forEach(t=>{if(m[t]<=1)m[t]=0;});
  Object.entries(best).forEach(([t,v])=>{m[t]=v===0?0:Math.round(m[t]*v*1000)/1000;});
  return m;
}

function getMatchupGroups(mon){
  const m=calcMatchups(mon);
  const weak=[],resist=[],immune=[];
  TYPES.forEach(t=>{
    if(m[t]===0)immune.push({type:t,val:0});
    else if(m[t]<1)resist.push({type:t,val:m[t]});
    else if(m[t]>=2)weak.push({type:t,val:m[t]});
  });
  return{weak,resist,immune};
}

// ── RADAR ──────────────────────────────────────────────────────────────────────
const SK=["hp","atk","def","spe","spd","spa"]; // radar order (in-game)
const SL=["HP","Atk","Def","Spe","SpD","SpA"];
const SC=["#e05555","#f08040","#f0c060","#4caf7d","#539ddf","#7c6ff7"];
const BAR_SK=["hp","atk","def","spa","spd","spe"]; // bar chart order (original)
const BAR_SL=["HP","Atk","Def","SpA","SpD","Spe"];
const BAR_SC=["#e05555","#f08040","#f0c060","#7c6ff7","#539ddf","#4caf7d"];

function statScale(v){
  const bps=[[0,0],[50,0.22],[100,0.50],[150,0.78],[170,0.88],[255,1.0]];
  for(let i=1;i<bps.length;i++){
    if(v<=bps[i][0]){
      const t=(v-bps[i-1][0])/(bps[i][0]-bps[i-1][0]);
      return bps[i-1][1]+t*(bps[i][1]-bps[i-1][1]);
    }
  }
  return 1;
}

function drawRadar(canvas,mon,size){
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext("2d");
  const cx=size/2,cy=size/2,r=size*0.36,n=6;
  ctx.clearRect(0,0,size,size);
  [50,100,150].forEach(ref=>{
    const f=statScale(ref);
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=i*2*Math.PI/n-Math.PI/2;
      i===0?ctx.moveTo(cx+Math.cos(a)*r*f,cy+Math.sin(a)*r*f):ctx.lineTo(cx+Math.cos(a)*r*f,cy+Math.sin(a)*r*f);
    }
    ctx.closePath();ctx.strokeStyle="rgba(46,50,72,0.9)";ctx.lineWidth=0.7;ctx.stroke();
  });
  for(let i=0;i<n;i++){
    const a=i*2*Math.PI/n-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.strokeStyle="rgba(46,50,72,0.9)";ctx.lineWidth=0.7;ctx.stroke();
    if(size>=160){
      ctx.fillStyle=SC[i];ctx.font="bold 10px 'Segoe UI',sans-serif";
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(SL[i],cx+Math.cos(a)*(r+14),cy+Math.sin(a)*(r+14));
    }
  }
  const vals=SK.map(k=>statScale(mon.stats[k]));
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const a=i*2*Math.PI/n-Math.PI/2;
    i===0?ctx.moveTo(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v):ctx.lineTo(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v);
  });
  ctx.closePath();ctx.fillStyle="rgba(124,111,247,0.2)";ctx.fill();
  ctx.strokeStyle="#7c6ff7";ctx.lineWidth=1.5;ctx.stroke();
  vals.forEach((v,i)=>{
    const a=i*2*Math.PI/n-Math.PI/2;
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*r*v,cy+Math.sin(a)*r*v,size>=160?3:2,0,2*Math.PI);
    ctx.fillStyle=SC[i];ctx.fill();
  });
}

// Returns a display copy of mon with altForm overrides applied if active
function getDisplayMon(mon){
  if(!mon) return mon;
  if(mon.baseForm && megaBaseActive.has(mon.id)){
    const base = POKEMON_DATA.find(p => p.id === mon.baseForm);
    if(base) return Object.assign({}, base); // base form's id used for sprite lookup
  }
  if(!mon.altForm || !altFormActive.has(mon.id)) return mon;
  return Object.assign({}, mon, {
    name: mon.altForm.name,
    type1: mon.altForm.type1,
    type2: mon.altForm.type2,
    stats: mon.altForm.stats,
    id: mon.altForm.spriteId || mon.id  // use alt sprite ID for image lookup
  });
}

// ── DRAG AND DROP ─────────────────────────────────────────────────────────────
// Works for both mouse (HTML5 drag) and touch (pointer events)
let dragSrcIdx = null;

function initDragAndDrop(){
  const teamEl = document.getElementById('draft-team');

  function swapSlots(srcIdx, destIdx){
    const tmp = team[srcIdx];
    team[srcIdx] = team[destIdx];
    team[destIdx] = tmp;
    const srcExp = expanded.has(srcIdx);
    const dstExp = expanded.has(destIdx);
    srcExp ? expanded.add(destIdx) : expanded.delete(destIdx);
    dstExp ? expanded.add(srcIdx) : expanded.delete(srcIdx);
    // Swap history — but only for empty slots (filled slots always have null history)
    const tmpHist = slotHistory[srcIdx];
    slotHistory[srcIdx] = slotHistory[destIdx];
    slotHistory[destIdx] = tmpHist;
  }
  // Mouse drag events (HTML5 draggable)
  // Only allow drag when initiated from the handle
  teamEl.addEventListener('mousedown', function(e){
    const t = e.target.closest ? e.target : e.target.parentElement;
    if(!t) return;
    const handle = t.closest('.drag-handle');
    if(handle){
      const slot = handle.closest('.draft-slot');
      if(slot) slot.setAttribute('draggable','true');
    }
  });
  teamEl.addEventListener('dragstart', function(e){
    const t = e.target.closest ? e.target : e.target.parentElement;
    if(!t) return;
    const slot = t.closest('.draft-slot');
    if(!slot || !t.closest('.drag-handle') && slot.getAttribute('draggable')!=='true') return;
    dragSrcIdx = parseInt(slot.dataset.slotIdx);
    slot.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  teamEl.addEventListener('dragend', function(e){
    document.querySelectorAll('.draft-slot').forEach(function(s){
      s.classList.remove('dragging','drag-over');
      s.removeAttribute('draggable');
    });
  });
  teamEl.addEventListener('dragover', function(e){
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const slot = e.target.closest('.draft-slot');
    if(!slot) return;
    document.querySelectorAll('.draft-slot').forEach(function(s){s.classList.remove('drag-over');});
    slot.classList.add('drag-over');
  });
  teamEl.addEventListener('dragleave', function(e){
    const slot = e.target.closest('.draft-slot');
    if(slot) slot.classList.remove('drag-over');
  });
  teamEl.addEventListener('drop', function(e){
    e.preventDefault();
    const slot = e.target.closest('.draft-slot');
    if(!slot) return;
    const destIdx = parseInt(slot.dataset.slotIdx);
    if(dragSrcIdx === null || dragSrcIdx === destIdx) return;
    // Move or swap
    swapSlots(dragSrcIdx, destIdx);
    dragSrcIdx = null;
    renderTeam(); renderSidebar(); saveSession();
  });

  // Touch drag (pointer events for mobile)
  let touchDragSrc = null;
  let touchClone = null;
  let touchOffX = 0, touchOffY = 0;

  teamEl.addEventListener('pointerdown', function(e){
    if(e.pointerType === 'mouse') return; // handled by HTML5 drag
    const handle = e.target.closest('.drag-handle');
    if(!handle) return;
    const slot = handle.closest('.draft-slot');
    if(!slot) return;
    touchDragSrc = parseInt(slot.dataset.slotIdx);
    const rect = slot.getBoundingClientRect();
    touchOffX = e.clientX - rect.left;
    touchOffY = e.clientY - rect.top;
    // Create visual clone
    touchClone = slot.cloneNode(true);
    touchClone.style.cssText = 'position:fixed;width:'+rect.width+'px;opacity:0.85;pointer-events:none;z-index:9999;border-radius:10px;background:var(--bg2);border:2px solid var(--accent);left:'+(e.clientX-touchOffX)+'px;top:'+(e.clientY-touchOffY)+'px;';
    document.body.appendChild(touchClone);
    slot.classList.add('dragging');
    e.preventDefault();
  }, {passive:false});

  document.addEventListener('pointermove', function(e){
    if(!touchClone) return;
    touchClone.style.left = (e.clientX-touchOffX)+'px';
    touchClone.style.top  = (e.clientY-touchOffY)+'px';
    // Highlight target
    document.querySelectorAll('.draft-slot').forEach(function(s){s.classList.remove('drag-over');});
    touchClone.style.display='none';
    const el = document.elementFromPoint(e.clientX, e.clientY);
    touchClone.style.display='';
    const target = el && el.closest('.draft-slot');
    if(target) target.classList.add('drag-over');
  });

  document.addEventListener('pointerup', function(e){
    if(!touchClone) return;
    touchClone.remove(); touchClone = null;
    document.querySelectorAll('.draft-slot').forEach(function(s){s.classList.remove('dragging','drag-over');});
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const target = el && el.closest('.draft-slot');
    if(target && touchDragSrc !== null){
      const destIdx = parseInt(target.dataset.slotIdx);
      if(touchDragSrc !== destIdx){
        swapSlots(touchDragSrc, destIdx);
        renderTeam(); renderSidebar(); saveSession();
      }
    }
    touchDragSrc = null;
  });
}

function renderTypeMatchups(){
  const active=team.filter(Boolean);
  const grid=document.getElementById("tm-grid");
  const expEl=document.getElementById("tm-expanded");
  if(!active.length){
    grid.style.display="grid";
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--text3);font-size:12px;padding:8px">Add Pokémon to see matchups</div>';
    if(expEl) expEl.innerHTML="";
    return;
  }
  const typeData=TYPES.map(function(atk){
    const vals=active.map(function(m){return calcMatchups(m)[atk];});
    const wN=vals.filter(function(v){return v>=2;}).length;
    const iN=vals.filter(function(v){return v===0;}).length;
    const rN=vals.filter(function(v){return v>0&&v<1;}).length;
    const riN=rN+iN;
    const bg=TYPE_COLORS[atk]||"#888";
    const textCol=TYPE_TEXT_DARK.has(atk)?"#333":"#fff";
    const tooltip=atk+": "+wN+" weak, "+rN+" resist, "+iN+" immune";
    const score=wN-riN;
    return {atk:atk,wN:wN,rN:rN,iN:iN,riN:riN,bg:bg,textCol:textCol,tooltip:tooltip,score:score};
  });

  if(!tmExpanded){
    grid.style.display="grid";
    if(expEl) expEl.style.display="none";
    grid.innerHTML=typeData.map(function(d){
      const pinCls=pinnedType===d.atk?" tm-pinned":"";
      const textCol=TYPE_TEXT_DARK.has(d.atk)?"#333":"#fff";
      return '<div class="tm-cell'+pinCls+'" data-type="'+d.atk+'" style="background:'+d.bg+'" title="'+d.tooltip+'">'
        +'<div class="tmt" style="color:'+textCol+'">'+TA[d.atk]+'</div>'
        +'<div class="tmv" style="color:'+textCol+'">'+d.wN+':'+d.riN+'</div>'
        +'</div>';
    }).join("");
    grid.querySelectorAll(".tm-cell").forEach(function(cell){
      const atk=cell.dataset.type;
      cell.addEventListener("mouseenter",function(){hoverMatchup(atk);});
      cell.addEventListener("mouseleave",function(){leaveMatchup(atk);});
      cell.addEventListener("click",function(){toggleMatchup(atk);});
    });
    updatePinnedVisual();
    return;
  }
  // Expanded view
  grid.style.display="none";
  if(expEl) expEl.style.display="block";
  const sorted=[].concat(typeData).sort(function(a,b){
    if(a.score!==b.score) return a.score-b.score;
    return b.riN-a.riN;
  });
  const strong=sorted.filter(function(d){return d.score<0;});
  const neutral=sorted.filter(function(d){return d.score===0;});
  const weak=sorted.filter(function(d){return d.score>0;});

  function badgeHTML(d){
    const pinCls=pinnedType===d.atk?" tm-pinned":"";
    const parts=[];
    if(d.wN) parts.push(d.wN+"W");
    if(d.rN) parts.push(d.rN+"R");
    if(d.iN) parts.push(d.iN+"I");
    const detail=parts.join(" · ")||"—";
    return '<div class="tm-exp-row">'
      +'<div class="tm-exp-badge'+pinCls+'" data-type="'+d.atk+'" style="background:'+d.bg+'" title="'+d.tooltip+'">'
      +'<span class="tm-exp-name" style="color:'+d.textCol+'">'+d.atk+'</span>'
      +'<span class="tm-exp-ratio" style="color:'+d.textCol+'">'+d.wN+':'+d.riN+'</span>'
      +'</div>'
      +'<span style="font-size:10px;color:var(--text3);flex-shrink:0;width:60px;text-align:right">'+detail+'</span>'
      +'</div>';
  }
  function sectionHTML(label,items){
    if(!items.length) return "";
    return '<div class="tm-section-divider">'+label+'</div>'+items.map(badgeHTML).join("");
  }
  expEl.innerHTML=sectionHTML("Strong",strong)+sectionHTML("Neutral",neutral)+sectionHTML("Weak",weak);
  expEl.querySelectorAll("[data-type]").forEach(function(el){
    const atk=el.dataset.type;
    el.addEventListener("mouseenter",function(){hoverMatchup(atk);});
    el.addEventListener("mouseleave",function(){leaveMatchup(atk);});
    el.addEventListener("click",function(){toggleMatchup(atk);});
  });
  updatePinnedVisual();
}


// Type matchup highlight state
let pinnedType = null; // locked by click
let hoveredType = null; // temporary on hover

function applyMatchupHighlight(atk){
  const cards=document.querySelectorAll(".draft-slot");
  cards.forEach((card,i)=>{
    const mon=team[i];
    if(!mon){card.style.outline="";card.style.backgroundColor="";return;}
    const v=calcMatchups(mon)[atk];
    if(v>=2){
      card.style.outline="2px solid var(--red)";
      card.style.backgroundColor="rgba(224,85,85,0.08)";
    } else if(v===0){
      card.style.outline="2px solid var(--text3)";
      card.style.backgroundColor="rgba(90,90,90,0.08)";
    } else if(v<1){
      const cbOn=document.body.classList.contains('cb');
      card.style.outline="2px solid "+(cbOn?"var(--cb-green)":"var(--green)");
      card.style.backgroundColor=cbOn?"rgba(96,165,250,0.08)":"rgba(76,175,125,0.08)";
    } else {
      card.style.outline="";
      card.style.backgroundColor="";
    }
  });
}

function clearMatchupHighlight(){
  document.querySelectorAll(".draft-slot").forEach(c=>{
    c.style.outline="";
    c.style.backgroundColor="";
  });
}

function hoverMatchup(atk){
  hoveredType=atk;
  if(!pinnedType) applyMatchupHighlight(atk);
}

function leaveMatchup(atk){
  hoveredType=null;
  if(!pinnedType) clearMatchupHighlight();
}

function updatePinnedVisual(){
  // Remove tm-pinned from all cells in both compact and expanded views
  document.querySelectorAll(".tm-cell,.tm-exp-badge").forEach(function(c){
    c.classList.remove("tm-pinned");
  });
  if(!pinnedType) return;
  // Re-apply to whichever elements are currently visible
  document.querySelectorAll(".tm-cell,.tm-exp-badge").forEach(function(c){
    if(c.dataset.type === pinnedType) c.classList.add("tm-pinned");
  });
}

function toggleMatchup(atk){
  if(pinnedType===atk){
    pinnedType=null;
    clearMatchupHighlight();
  } else {
    pinnedType=atk;
    applyMatchupHighlight(atk);
  }
  updatePinnedVisual();
}

    + '<button id="type-mode-and" onclick="setTypeFilterMode(\'and\')" style="padding:2px 12px;font-size:11px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--accent);">AND</button>'
    + '</div>';
  typeDd.appendChild(modeRow);

  // 3×6 type grid
  const typeGrid = document.createElement('div');
  typeGrid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:4px;';
  TYPES.forEach(function(t){
    const opt = document.createElement('div');
    opt.id = 'idx-type-chip-' + t;
    opt.className = 'type-badge t-' + t;
    opt.textContent = t;
    opt.style.cssText = 'cursor:pointer;text-align:center;padding:3px 0;font-size:10px;opacity:0.45;transition:opacity 0.12s,outline 0.12s;';
    opt.addEventListener('click', function(){
      if(idxSelectedTypes.has(t)){
        idxSelectedTypes.delete(t);
        opt.style.opacity = '0.45';
        opt.style.outline = '';
      } else {
        idxSelectedTypes.add(t);
        opt.style.opacity = '1';
        opt.style.outline = '2px solid #fff';
        opt.style.outlineOffset = '-2px';
      }
      updateMultiDisplay('idx-type', idxSelectedTypes, 'All Types');
      renderIdx();
    });
    typeGrid.appendChild(opt);
  });
  typeDd.appendChild(typeGrid);

  // Ability single-select
  const abSet = new Set();
  POKEMON_DATA.forEach(p => p.abilities.forEach(a => abSet.add(a)));
  const abList = [...abSet].sort();
  const abDd = document.getElementById('idx-ability-dropdown');

  const abSearch = document.createElement('input');
  abSearch.type = 'text';
  abSearch.placeholder = 'Search abilities...';
  abSearch.style.cssText = 'width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-size:12px;margin-bottom:6px;outline:none;';
  abSearch.addEventListener('input', function(){
    const q = this.value.trim().toLowerCase();
    abDd.querySelectorAll('.ab-opt').forEach(function(opt){
      opt.style.display = opt.dataset.ab.includes(q) ? '' : 'none';
    });
  });
  abDd.appendChild(abSearch);

  abList.forEach(function(a){
    const opt = document.createElement('div');
    opt.className = 'fi-multi-opt ab-opt';
    opt.dataset.ab = a.toLowerCase();
    opt.textContent = a;
    opt.style.cssText = 'padding:5px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text2);';
    opt.addEventListener('click', function(){
      if(selectedAbility === a){
        selectedAbility = '';
        opt.style.background = '';
        opt.style.color = 'var(--text2)';
        document.getElementById('idx-ability-display').innerHTML = 'All Abilities <span class="fi-arrow">▾</span>';
        document.getElementById('idx-ability-display').classList.remove('active');
      } else {
        abDd.querySelectorAll('.ab-opt').forEach(o => { o.style.background=''; o.style.color='var(--text2)'; });
        selectedAbility = a;
        opt.style.background = 'var(--bg3)';
        opt.style.color = 'var(--accent)';
        document.getElementById('idx-ability-display').innerHTML = a + ' <span class="fi-arrow">▾</span>';
        document.getElementById('idx-ability-display').classList.add('active');
      }
      renderIdx();
    });
    abDd.appendChild(opt);
  });

  // Points min/max
  const ptsVals=[...new Set(POKEMON_DATA.filter(p=>p.legal).map(p=>p.points))].sort((a,b)=>a-b);
  const pMin=document.getElementById("idx-pts-min");
  const pMax=document.getElementById("idx-pts-max");
  ptsVals.forEach(function(v){
    const o1=document.createElement("option"); o1.value=v; o1.textContent=v+' pts'; pMin.appendChild(o1);
    const o2=document.createElement("option"); o2.value=v; o2.textContent=v+' pts'; pMax.appendChild(o2);
  });

  // Move multi-select (grouped by category)
  const moveDd = document.getElementById('idx-move-dropdown');
  UG.forEach(function(g){
    const sec = document.createElement('div');
    sec.className = 'fi-multi-section';
    sec.textContent = g.label;
    moveDd.appendChild(sec);
    g.moves.forEach(function(mv){
      const opt = document.createElement('div');
      opt.className = 'fi-multi-opt';
      opt.innerHTML = '<input type="checkbox" id="idx-move-'+mv.replace(/\s/g,'-')+'"><span>'+mv+'</span>';
      opt.querySelector('input').addEventListener('change', function(){
        if(this.checked) idxSelectedMoves.add(mv); else idxSelectedMoves.delete(mv);
        opt.classList.toggle('checked', this.checked);
        updateMultiDisplay('idx-move', idxSelectedMoves, 'All Moves');
        renderIdx();
      });
      moveDd.appendChild(opt);
    });
  });

  ["idx-search","idx-pts-min","idx-pts-max"].forEach(function(id){
    document.getElementById(id).addEventListener("input",renderIdx);
  });
  document.getElementById("idx-legal-only").addEventListener("change",renderIdx);
}
function getFiltered(){
  const q=document.getElementById("idx-search").value.trim().toLowerCase();
  const ab=selectedAbility;
  const pmin=document.getElementById("idx-pts-min").value;
  const pmax=document.getElementById("idx-pts-max").value;
  const lo=document.getElementById("idx-legal-only").checked;
  return POKEMON_DATA.filter(function(p){
    if(q&&!p.name.toLowerCase().includes(q))return false;
    // Type multi-select: match if pokemon has ANY of the selected types
    if(idxSelectedTypes.size>0){
      if(idxTypeFilterAnd){
        for(const t of idxSelectedTypes){ if(p.type1!==t&&p.type2!==t) return false; }
      } else {
        if(!idxSelectedTypes.has(p.type1)&&!idxSelectedTypes.has(p.type2)) return false;
      }
    }
    if(ab&&!p.abilities.includes(ab))return false;
    if(pmin&&(!p.legal||p.points<parseInt(pmin)))return false;
    if(pmax&&(!p.legal||p.points>parseInt(pmax)))return false;
    // Move multi-select: match if pokemon has ALL of the selected moves
    if(idxSelectedMoves.size>0){
      for(const mv of idxSelectedMoves){ if(!(p.moves||[]).includes(mv))return false; }
    }
    if(lo&&!p.legal)return false;
    return true;
  });
}
function sortIdx(col){
  if(idxSort.col===col)idxSort.dir*=-1;else{idxSort.col=col;idxSort.dir=1;}
  document.querySelectorAll(".idx-tbl th[data-col]").forEach(th=>{
    th.classList.remove("sa","sd");
    if(th.dataset.col===col)th.classList.add(idxSort.dir===1?"sa":"sd");
  });
  renderIdx();
}
// Set table header sticky offset to match nav height
function updateStickyOffset(){
  const nav = document.querySelector('nav');
  const filters = document.querySelector('.filters');
  if(nav && filters){
    const navH = nav.getBoundingClientRect().height;
    const filtersH = filters.getBoundingClientRect().height;
    const top = navH + filtersH + 8;
    document.querySelectorAll('.idx-tbl th').forEach(function(th){
      th.style.top = top + 'px';
    });

}

let idxExpandedIds = new Set();

function buildIdxExpanded(baseMon){
  const p = baseMon;

  // Stat bars
  const bars = BAR_SK.map(function(k,i){
    const v=p.stats[k], pct=Math.round(statScale(v)*100);
    return '<div class="stat-bar-row">'
      +'<span class="stat-bar-label" style="color:'+BAR_SC[i]+'">'+BAR_SL[i]+'</span>'
      +'<div class="stat-bar-bg"><div class="stat-bar-fill" style="width:'+pct+'%;background:'+BAR_SC[i]+'"></div></div>'
      +'<span class="stat-bar-val">'+v+'</span>'
      +'</div>';
  }).join('');

  // Type matchups
  const mup = calcMatchups(p);
  const weak=[], resist=[], immune=[];
  TYPES.forEach(function(t){
    if(mup[t]===0) immune.push({type:t,val:0});
    else if(mup[t]<1) resist.push({type:t,val:mup[t]});
    else if(mup[t]>=2) weak.push({type:t,val:mup[t]});
  });
  let tmHTML = '';
  if(weak.length) tmHTML += '<div class="idx-exp-tm" style="margin-bottom:4px">'+weak.map(function(t){return '<span class="tm-weak-sm'+(t.val>=4?' tm-4x':'')+'\">'+(t.val>=4?'▲▲':'▲')+' '+t.type+'</span>';}).join('')+'</div>';
  if(resist.length) tmHTML += '<div class="idx-exp-tm" style="margin-bottom:4px">'+resist.map(function(t){return '<span class="tm-resist-sm'+(t.val<=0.25?' tm-quarter':'')+'\">'+(t.val<=0.25?'▼▼':'▼')+' '+t.type+'</span>';}).join('')+'</div>';
  if(immune.length) tmHTML += '<div class="idx-exp-tm">'+immune.map(function(t){return '<span class="tm-immune-sm">✕ '+t.type+'</span>';}).join('')+'</div>';

  // Utility moves
  const movesHTML = (p.moves||[]).length
    ? (p.moves||[]).map(function(m){return '<span class="move-tag">'+m+'</span>';}).join('')
    : '<span style="color:var(--text3);font-size:11px">None</span>';

  return '<td colspan="13">'
    +'<div class="idx-expanded">'
      +'<div class="idx-exp-radar"><canvas id="idx-radar-'+p.id.replace(/[^a-z0-9]/gi,'_')+'" width="160" height="160"></canvas></div>'
      +'<div class="idx-exp-stats">'+bars+'</div>'
      +'<div class="idx-exp-right">'
        +'<div><div class="idx-exp-section-title">Type Matchups</div>'+tmHTML+'</div>'
        +'<div><div class="idx-exp-section-title">Utility Moves</div><div class="idx-exp-moves">'+movesHTML+'</div></div>'
      +'</div>'
    +'</div>'
    +'</td>';
}

function createLazyObserver(containerSelector, rootMargin){
  const obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        e.target.src = e.target.dataset.src;
        setIconFallback(e.target);
        obs.unobserve(e.target);
      }
    });
  }, {rootMargin: rootMargin});
  document.querySelectorAll(containerSelector+" img[data-src]")
    .forEach(function(img){ obs.observe(img); });
  return obs;
}

function renderIdx(){
  let data=getFiltered();
  const{col,dir}=idxSort;
  data.sort(function(a,b){
    let av,bv;
    if(col==="id"){av=parseFloat(a.id)||a.id;bv=parseFloat(b.id)||b.id;}
    else if(["hp","atk","def","spa","spd","spe","bst"].includes(col)){av=a.stats[col];bv=b.stats[col];}
    else if(col==="points"){av=a.points!=null?a.points:9999;bv=b.points!=null?b.points:9999;}
    else{av=(a[col]||"").toLowerCase();bv=(b[col]||"").toLowerCase();}
    return av<bv?-dir:av>bv?dir:0;
  });
  document.getElementById("idx-count").textContent=data.length+" Pokémon";

  // Snapshot already-loaded icon srcs to avoid flicker on re-render
  const loadedIcons = {};
  document.querySelectorAll("#idx-body img.tbl-icon[src]").forEach(function(img){
    const alt = img.alt;
    if(alt && img.src && !img.src.endsWith('undefined')) loadedIcons[alt] = img.src;
  });

  let rows = "";
  data.forEach(function(p){
    const isExp = idxExpandedIds.has(p.id);
    const iconSrc = loadedIcons[p.name];
    rows += '<tr class="data-row '+(p.legal?"":"illegal")+(isExp?" expanded":"")
      +'" data-id="'+p.id+'">'
      +'<td>'+p.id+'</td>'
      +'<td><img class="tbl-icon" '+(iconSrc?'src="'+iconSrc+'"':'data-src="'+iconUrl(p)+'"')+' alt="'+p.name+'"></td>'
      +'<td style="font-weight:600">'+p.name+'</td>'
      +'<td><span class="type-badge t-'+p.type1+'">'+p.type1+'</span>'
        +(p.type2?'<span class="type-badge t-'+p.type2+'" style="margin-left:3px">'+p.type2+'</span>':'')+'</td>'
      +'<td style="font-weight:600;color:'+(p.legal?'var(--yellow)':'var(--text3)')+'">'+(p.legal?p.points:'—')+'</td>'
      +'<td>'+p.stats.hp+'</td><td>'+p.stats.atk+'</td><td>'+p.stats.def+'</td>'
      +'<td>'+p.stats.spa+'</td><td>'+p.stats.spd+'</td><td>'+p.stats.spe+'</td>'
      +'<td style="font-weight:600">'+p.stats.bst+'</td>'
      +'<td style="color:var(--text2);font-size:12px">'+p.abilities.join(", ")+'</td>'
      +'</tr>';
    if(isExp){
      rows += '<tr class="idx-exp-row">'+buildIdxExpanded(p)+'</tr>';
    }
  });
  document.getElementById("idx-body").innerHTML = rows;

  // Apply fallback to already-loaded icons (they skip lazy load since they have src not data-src)
  document.querySelectorAll("#idx-body img.tbl-icon[src]").forEach(function(img){
    setIconFallback(img);
  });

  // Click to expand/collapse — now toggles within a Set
  document.querySelectorAll("#idx-body tr.data-row").forEach(function(row){
    row.addEventListener("click", function(){
      const id = this.dataset.id;
      if(idxExpandedIds.has(id)) idxExpandedIds.delete(id);
      else idxExpandedIds.add(id);
      renderIdx();
      // Draw radars for all expanded rows
      idxExpandedIds.forEach(function(eid){
        const p = POKEMON_DATA.find(function(x){return x.id===eid;});
        if(p){
          const canvasId = "idx-radar-"+p.id.replace(/[^a-z0-9]/gi,'_');
          const canvas = document.getElementById(canvasId);
          if(canvas) drawRadar(canvas, p, 160);
        }
      });
    });
  });

  // Lazy load icons that don't yet have a src
  if(lazyObs)lazyObs.disconnect();
  lazyObs = createLazyObserver("#idx-body", "400px");
}

// ── POOL ───────────────────────────────────────────────────────────────────────
let poolObs=null;
function renderPool(filter){
  const q=(filter||"").trim().toLowerCase();
  const legal=POKEMON_DATA.filter(p=>p.legal&&(!q||p.name.toLowerCase().includes(q)));
  const byPts={};
  legal.forEach(p=>{if(!byPts[p.points])byPts[p.points]=[];byPts[p.points].push(p);});
  Object.values(byPts).forEach(arr=>arr.sort((a,b)=>a.name.localeCompare(b.name)));
  const tiers=Object.keys(byPts).map(Number).sort((a,b)=>b-a);
  document.getElementById("pool-count").textContent=legal.length+" legal Pokémon";
  document.getElementById("pool-grid").innerHTML=tiers.map(function(pts){
    const mons=byPts[pts].map(function(p){
      return '<div class="pool-mon" data-name="'+p.name+'">'
        +'<img data-src="'+iconUrl(p)+'" alt="'+p.name+'" style="width:40px;height:40px;image-rendering:pixelated">'
        +'<div class="pool-mon-name">'+p.name+'</div>'
        +'</div>';
    }).join("");
    return '<div class="pool-tier">'
      +'<div class="pool-tier-hdr">'
      +'<span class="pool-tier-pts">'+pts+'</span><span class="pool-tier-lbl">points</span>'
      +'<span class="pool-tier-cnt">'+byPts[pts].length+' Pokémon</span>'
      +'</div>'
      +'<div class="pool-pokemon">'+mons+'</div>'
      +'</div>';
  }).join("");
  // Attach click events via JS
  document.querySelectorAll("#pool-grid .pool-mon").forEach(function(el){
    el.addEventListener("click", function(){
      const name = this.dataset.name;
      const mon = POKEMON_DATA.find(function(p){ return p.name === name; });
      if(!mon) return;
      // Check if already on team
      if(team.some(function(m){ return m && m.id === mon.id; })){
        showToast(mon.name + ' is already on your team.', 'warn');
        return;
      }
      // Check if team is full
      const slot = team.findIndex(function(s){ return s === null; });
      if(slot === -1){
        showToast('Your team is full! Remove a Pokémon first.', 'warn');
        return;
      }
      team[slot] = mon;
      slotHistory[slot] = null;
      renderTeam(); renderSidebar(); saveSession();
      showToast(mon.name + ' added to slot ' + (slot + 1) + '.', 'ok');
    });
  });
  if(poolObs) poolObs.disconnect();
  poolObs = createLazyObserver("#pool-grid", "400px");
}
document.getElementById("pool-search").addEventListener("input",e=>renderPool(e.target.value));

// ── SLOT POPOVER ──────────────────────────────────────────────────────────────
let popoverTargetSlot = null;
let justOpened = false;
let popoverHlIdx = -1;
let popoverResults = [];

function openSlotPopoverByIdx(slotIdx, el){
  const anchor = el || document.querySelector('[data-slotidx="'+slotIdx+'"]');
  openSlotPopover(slotIdx, anchor);
}

function openSlotPopover(slotIdx, anchorEl){
  popoverTargetSlot = slotIdx;
  popoverHlIdx = -1;
  popoverResults = [];
  const pop = document.getElementById('slot-popover');
  const input = document.getElementById('slot-pop-input');
  const results = document.getElementById('slot-pop-results');
  input.value = '';
  results.innerHTML = '';
  pop.style.display = 'block';
  document.getElementById('slot-backdrop').style.display = 'block';
  justOpened = true;
  setTimeout(function(){ justOpened = false; }, 50);

  // Position: right of anchor, or below if near right edge
  const rect = anchorEl.getBoundingClientRect();
  const scrollY = window.scrollY||window.pageYOffset;
  const scrollX = window.scrollX||window.pageXOffset;
  let left = rect.right + scrollX + 8;
  let top  = rect.top  + scrollY;
  if(left + 284 > window.innerWidth + scrollX - 8){
    left = rect.left + scrollX;
    top  = rect.bottom + scrollY + 8;
  }
  pop.style.left = left+'px';
  pop.style.top  = top+'px';
  setTimeout(function(){ input.focus(); }, 30);
}

function closeSlotPopover(){
  const pop = document.getElementById('slot-popover');
  if(!pop) return;
  pop.style.display = 'none';
  const bd=document.getElementById('slot-backdrop'); if(bd) bd.style.display='none';
  popoverTargetSlot = null;
  popoverHlIdx = -1;
  popoverResults = [];
}

function renderPopoverResults(q){
  q = q.trim().toLowerCase();
  const resultsEl = document.getElementById('slot-pop-results');
  if(!q){ resultsEl.innerHTML=''; popoverResults=[]; return; }
  popoverResults = POKEMON_DATA.filter(function(p){
    const legalOnly=document.getElementById('draft-legal-only').checked;
    return !altFormIds.has(p.id)&&(!legalOnly||p.legal)&&(p.name.toLowerCase().includes(q)||p.id.toLowerCase().startsWith(q));
  }).slice(0,12);
  if(!popoverResults.length){
    resultsEl.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">No results</div>';
    return;
  }
  let h='';
  popoverResults.forEach(function(p,i){
    const inTeam=team.some(function(m){return m&&m.id===p.id;});
    let cls='';
    if(inTeam) cls+=' already-in';
    if(!p.legal) cls+=' illegal-r';
    h+='<div class="slot-pop-item'+cls+'" data-idx="'+i+'">'
      +'<img class="slot-pop-sprite" src="'+spriteUrl(p)+'" alt="'+p.name+'">'
      +'<div>'
        +'<div class="slot-pop-name">'+p.name+'</div>'
        +'<div class="slot-pop-sub">'
          +'<span class="type-badge t-'+p.type1+'" style="font-size:9px;padding:1px 4px">'+p.type1+'</span>'
          +(p.type2?'<span class="type-badge t-'+p.type2+'" style="font-size:9px;padding:1px 4px">'+p.type2+'</span>':'')
        +'</div>'
      +'</div>'
      +'<span class="slot-pop-pts" style="color:'+(p.legal?'var(--yellow)':'var(--red)')+';">'
        +(p.legal?p.points+' pts':'Illegal')+'</span>'
      +'</div>';
  });
  resultsEl.innerHTML=h;
  // Use mousedown + stopPropagation so document mousedown doesn't close before click fires
  resultsEl.querySelectorAll('.slot-pop-item:not(.already-in)').forEach(function(el){
    el.addEventListener('mousedown', function(e){
      e.stopPropagation();
      const idx=parseInt(el.dataset.idx);
      if(popoverResults[idx]) addToSlot(popoverTargetSlot, popoverResults[idx]);
    });
  });
  updatePopoverHighlight();
}

function updatePopoverHighlight(){
  document.querySelectorAll('.slot-pop-item').forEach(function(el,i){
    el.classList.toggle('highlighted', i===popoverHlIdx);
  });
}

function addToSlot(slotIdx, mon){
  if(slotIdx===null||slotIdx===undefined) return;
  if(team.some(function(m){return m&&m.id===mon.id;})) return;
  team[slotIdx]=mon;slotHistory[slotIdx]=null;
  closeSlotPopover();
  renderTeam(); renderSidebar();
  saveSession();
}

function initSlotPopover(){
  const input=document.getElementById('slot-pop-input');
  const pop=document.getElementById('slot-popover');

  // Prevent clicks inside popover from bubbling to document close handler
  pop.addEventListener('mousedown', function(e){ e.stopPropagation(); });

  input.addEventListener('input', function(){
    popoverHlIdx=-1;
    renderPopoverResults(this.value);
  });
  input.addEventListener('keydown', function(e){
    const items=document.querySelectorAll('.slot-pop-item:not(.already-in)');
    if(e.key==='ArrowDown'){
      e.preventDefault();
      popoverHlIdx=Math.min(popoverHlIdx+1,items.length-1);
      updatePopoverHighlight();
    } else if(e.key==='ArrowUp'){
      e.preventDefault();
      popoverHlIdx=Math.max(popoverHlIdx-1,0);
      updatePopoverHighlight();
    } else if(e.key==='Enter'){
      e.preventDefault();
      const idx=popoverHlIdx>=0?popoverHlIdx:0;
      if(popoverResults[idx]) addToSlot(popoverTargetSlot,popoverResults[idx]);
    } else if(e.key==='Escape'){
      closeSlotPopover();
    }
  });

  // Close on any click outside the popover
  // Use both mousedown and click to catch all cases
  function outsideClickHandler(e){
    if(justOpened) return;
    // If clicking another + button, let its onclick handle opening - just close current
    const t = e.target.closest ? e.target : e.target.parentElement;
    if(t && t.closest('.slot-sprite-empty')){
      closeSlotPopover();
      return;
    }
    if(pop.style.display!=='none' && !pop.contains(e.target)){
      closeSlotPopover();
    }
  }
  document.addEventListener('click', outsideClickHandler);

  // Close when main search bar is focused
  document.getElementById('draft-search').addEventListener('focus', function(){
    closeSlotPopover();
  });
}

// ── VIEW ─────────────────────────────────────────────────────────────────────── ───────────────────────────────────────────────────────────────────────
function showView(name){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("view-"+name).classList.add("active");
  const lbl={draft:"draft b",index:"pokédex",pool:"pool"};
  document.querySelectorAll(".nav-tab").forEach(t=>{if(t.textContent.toLowerCase().includes(lbl[name]))t.classList.add("active");});
  if(name==='index') updateStickyOffset();
}
